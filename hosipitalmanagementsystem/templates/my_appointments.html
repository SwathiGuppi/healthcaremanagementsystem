<!DOCTYPE html>

<html>

<head>

<title>My Appointments</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>


body{

background:#f1f5f9;

}


.container{

margin-top:40px;

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}


h2{

text-align:center;

margin-bottom:30px;

}


</style>


</head>


<body>


<div class="container">


<h2>
❤️ My Appointments
</h2>



<table class="table table-hover table-bordered">


<tr>

<th>
Doctor
</th>

<th>
Date
</th>

<th>
Status
</th>

</tr>



{% for a in appointments %}



<tr>


<td>

{{a[2]}}

</td>



<td>

{{a[3]}}

</td>



<td>


{% if a[4] == 'Confirmed' %}


<span class="badge bg-success">

Confirmed

</span>



{% elif a[4] == 'Cancelled' %}



<span class="badge bg-danger">

Cancelled

</span>



{% else %}



<span class="badge bg-warning text-dark">

Pending

</span>



{% endif %}



</td>



</tr>



{% endfor %}



</table>



</div>


</body>


</html>
