<!DOCTYPE html>
<html>


<head>

<title>Edit Patient</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>



<body class="bg-light">



<div class="container mt-5">



<div class="card p-4 shadow">



<h2>
✏ Edit Patient
</h2>



<form method="POST">



<input 
class="form-control mb-3"
name="name"
value="{{patient[1]}}"
required>



<input 
class="form-control mb-3"
name="email"
value="{{patient[2]}}"
required>




<input 
class="form-control mb-3"
name="age"
value="{{patient[4]}}"
>




<select class="form-control mb-3"
name="gender">


<option>
{{patient[5]}}
</option>

<option>
Male
</option>


<option>
Female
</option>


</select>




<input 
class="form-control mb-3"
name="phone"
value="{{patient[6]}}"
>



<input 
class="form-control mb-3"
name="disease"
value="{{patient[7]}}"
>



<input 
class="form-control mb-3"
name="doctor"
value="{{patient[8]}}"
>



<button class="btn btn-success">

Update Patient

</button>



</form>



</div>



</div>


</body>


</html>
