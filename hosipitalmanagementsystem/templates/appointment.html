<!DOCTYPE html>
<html>

<head>

<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>


body{

background:linear-gradient(135deg,#e0f7ff,#f4f7fc);

min-height:100vh;

}



.appointment-card{

margin-top:60px;

border:none;

border-radius:20px;

overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

}



.header{

background:linear-gradient(135deg,#ff416c,#ff4b2b);

color:white;

padding:25px;

text-align:center;

}



.form-control{

height:50px;

border-radius:12px;

}



.btn-book{

background:linear-gradient(135deg,#11998e,#38ef7d);

border:none;

height:50px;

border-radius:12px;

font-size:18px;

font-weight:bold;

color:white;

transition:0.3s;

}



.btn-book:hover{

transform:scale(1.03);

}



.icon{

font-size:40px;

}



</style>


</head>



<body>



<div class="container">


<div class="row justify-content-center">


<div class="col-md-6">



<div class="card appointment-card">



<div class="header">


<div class="icon">
🏥
</div>


<h2>
Book Appointment
</h2>


<p>
Schedule your hospital visit easily
</p>



</div>





<div class="card-body p-4">



<form method="POST">



<label class="fw-bold">

👤 Patient Name

</label>


<input

type="text"

name="patient_name"

value="{{patient_name}}"

class="form-control"

placeholder="Enter patient name"

required>


<br>





<label class="fw-bold">

👨‍⚕️ Doctor Name

</label>


<input

type="text"

name="doctor_name"

value="{{doctor_name}}"

class="form-control"

placeholder="Doctor name"

required>


<br>





<label class="fw-bold">

📅 Appointment Date

</label>


<input

type="date"

name="appointment_date"

id="date"

class="form-control"

required>


<br>





<button class="btn btn-book w-100">

Confirm Appointment ✅

</button>



</form>




</div>


</div>



</div>


</div>


</div>





<script>


// disable past dates

let today = new Date().toISOString().split("T")[0];


document.getElementById("date").setAttribute(
"min",
today
);


</script>



</body>


</html>
