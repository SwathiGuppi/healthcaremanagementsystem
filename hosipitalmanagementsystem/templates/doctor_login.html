<!DOCTYPE html>
<html>
<head>

    <title>Doctor Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#2563eb,#1e3a8a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:420px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        .card-header{
            background:#0f172a;
            color:white;
            text-align:center;
            padding:25px;
        }

        .btn-login{
            background:#2563eb;
            color:white;
            height:50px;
            border:none;
            border-radius:10px;
        }

        .btn-login:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<div class="card login-card">

    <div class="card-header">

        <h2>👨‍⚕️ Doctor Login</h2>

        <p>Healthcare Management System</p>

    </div>

    <div class="card-body p-4">

        <form method="POST">

            <label>Email</label>

            <input
                type="email"
                name="email"
                class="form-control"
                required>

            <br>

            <label>Password</label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>

            <br>

            <button class="btn btn-login w-100">

                Login

            </button>

        </form>

        <hr>

        <a href="/" class="btn btn-secondary w-100">

            Back Home

        </a>

    </div>

</div>

</body>
</html>
