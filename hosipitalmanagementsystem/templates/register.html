<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow mt-5">

<div class="card-header bg-success text-white">
<h3>Patient Registration</h3>
</div>

<div class="card-body">

<form method="POST">

<input
type="text"
name="name"
class="form-control"
placeholder="Name"
required>

<br>

<input
type="email"
name="email"
class="form-control"
placeholder="Email"
required>

<br>

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

<br>

<button class="btn btn-success w-100">
Register
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
