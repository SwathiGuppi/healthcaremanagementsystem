<!DOCTYPE html>
<html>

<head>

<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    background:#f4f7fc;
}

.card{

    margin-top:50px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);

}

</style>

</head>


<body>


<div class="container">


<div class="card p-4">


<h2>
📅 Book Appointment
</h2>


<form method="POST" action="/book_appointment">



<label>
Patient Name
</label>


<input 
class="form-control mb-3"
type="text"
name="patient"
placeholder="Enter patient name"
required>




<label>
Doctor Name
</label>


<input 
class="form-control mb-3"
type="text"
name="doctor"
placeholder="Enter doctor name"
required>




<label>
Appointment Date
</label>


<input 
class="form-control mb-3"
type="date"
name="date"
required>



<label>
Time
</label>


<input 
class="form-control mb-3"
type="text"
name="time"
placeholder="10:00 AM"
required>




<button class="btn btn-success">

📅 Book Appointment

</button>



<a href="/manage_appointments"
class="btn btn-secondary">

Back

</a>



</form>


</div>


</div>


</body>


</html>
