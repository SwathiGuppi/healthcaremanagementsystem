<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
        }

        .card{
            margin-top:50px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,.2);
        }
    </style>

</head>
<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card">

<div class="card-header bg-primary text-white">

<h3>➕ Add New Doctor</h3>

</div>

<div class="card-body">

<form method="POST">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

<br>

<label>Specialization</label>

<input
type="text"
name="specialization"
class="form-control"
required>

<br>

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

<br>

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

<br>

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
required>

<br>

<button class="btn btn-success w-100">

Save Doctor

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
