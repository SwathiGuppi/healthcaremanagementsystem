<!DOCTYPE html>
<html>
<head>
    <title>Edit Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">
<h3>Edit Doctor</h3>
</div>

<div class="card-body">

<form method="POST">

<label>Name</label>
<input type="text" name="name" class="form-control" value="{{doctor[1]}}" required>

<br>

<label>Specialization</label>
<input type="text" name="specialization" class="form-control" value="{{doctor[2]}}" required>

<br>

<label>Email</label>
<input type="email" name="email" class="form-control" value="{{doctor[3]}}" required>

<br>

<label>Password</label>
<input type="text" name="password" class="form-control" value="{{doctor[4]}}" required>

<br>

<label>Phone</label>
<input type="text" name="phone" class="form-control" value="{{doctor[5]}}" required>

<br>

<label>Status</label>

<select name="status" class="form-control">

<option {% if doctor[6]=="Available" %}selected{% endif %}>Available</option>

<option {% if doctor[6]=="Busy" %}selected{% endif %}>Busy</option>

<option {% if doctor[6]=="On Leave" %}selected{% endif %}>On Leave</option>

</select>

<br>

<button class="btn btn-success w-100">
Update Doctor
</button>

</form>

</div>

</div>

</div>

</body>
</html>
