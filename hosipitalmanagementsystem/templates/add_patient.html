<!DOCTYPE html>
<html>

<head>

<title>Add Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    background:#f4f7fc;
}


.card{

    margin-top:50px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);

}

</style>


</head>


<body>


<div class="container">


<div class="card p-4">


<h2>
🧑 Add Patient
</h2>


<form method="POST" action="/add_patient">



<input 
class="form-control mb-3"
type="text"
name="name"
placeholder="Patient Name"
required>



<input 
class="form-control mb-3"
type="email"
name="email"
placeholder="Email"
required>



<input 
class="form-control mb-3"
type="password"
name="password"
placeholder="Password"
required>




<input 
class="form-control mb-3"
type="number"
name="age"
placeholder="Age"
required>



<select 
class="form-control mb-3"
name="gender">


<option>Male</option>

<option>Female</option>

<option>Other</option>


</select>




<input 
class="form-control mb-3"
type="text"
name="phone"
placeholder="Phone Number">




<input 
class="form-control mb-3"
type="text"
name="disease"
placeholder="Disease / Symptoms">




<input 
class="form-control mb-3"
type="text"
name="doctor"
placeholder="Assigned Doctor">





<button class="btn btn-success">

Save Patient

</button>



<a href="/manage_patients" class="btn btn-secondary">

Back

</a>



</form>


</div>


</div>



</body>


</html>
